<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- bootstrap pour ganer du temps sur la mise page -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Le juste prix</title>
</head>

<body>
    <h2>LE JUSTE PRIX</h2>
    <div class="container">
        <div class="row">
            <div class="container-fuild p-2 bg-primary text-white text-center">
                <div class="mb-6">
                    <div id="objet"></div>
                    <div id="nom-objet"></div>
                    <br>
                </div>

                <div class="mb-6">
                    <label for="prixProp" class="form-label">
                    <h2> Vas-y : proposes un prix entre 1 € et 100 €</h2>
                </label>
                    <input type="number" class="form-control" id="prix-Prop" aria-describedby="prix-Prop">
                    <div class="gneu">
                        <h4>Trouver le prix de cet objet pour le gagner</h4>
                    </div>
                    <div style="color: white;background-color: blueviolet; " id="nbr-tente" class="form-text"></div>
                </div>

            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="container-fuild p-5 bg-primary text-white text-center">
                <div class="mb-6">
                    <button id="bouton" class="btn btn-dark">Valider</button>
                    <div style="background-color: black; " id="message"></div>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>

</html>
