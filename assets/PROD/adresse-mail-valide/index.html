<html lang="en">

<body>
    <h1>Saisissez une adresse mail valide!</h1>

    <!-- création du formulaire -->

    <div class="container">
        <div class="row">
            <div class="col-sm-6 mx-auto mt-5 text-center">
                <div class="container-fluid p-3 bg-primary text-white text-center">
                    <div class="mb-6">
                        <label for="email" class="form-label">Votre mail : </label>
                        <input type="text" class="form-control" id="email" aria-describedby="email">

                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- l'"id=message" permet à l'index.js d'identifier l'élément sur lequel se baser pour renvoyer un mesage à l'utilisateur -->
